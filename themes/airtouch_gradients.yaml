# Gradient Themes
# Gradient card backgrounds matching the AirTouch Card (mycrouch/airtouch-card),
# in twenty selectable colours. Select per dashboard, per view, or per section.
# The raw gradient is exposed as --card-gradient for card-mod / custom cards.

Gradient Blue:
  card-gradient: "linear-gradient(145deg, #0d2b45 0%, #1565c0 130%)"
  ha-card-background: "linear-gradient(145deg, #0d2b45 0%, #1565c0 130%)"
  card-background-color: "#104276"
  primary-color: "#7eaadc"
  accent-color: "#7eaadc"
  primary-text-color: "#ffffff"
  secondary-text-color: "rgba(255,255,255,0.72)"
  text-primary-color: "#ffffff"
  disabled-text-color: "rgba(255,255,255,0.4)"
  paper-item-icon-color: "rgba(255,255,255,0.82)"
  paper-item-icon-active-color: "#7CFC98"
  state-icon-color: "rgba(255,255,255,0.82)"
  divider-color: "rgba(255,255,255,0.14)"
  secondary-background-color: "rgba(0,0,0,0.25)"
  ha-card-border-width: "0px"
  ha-card-border-radius: "14px"
  ha-card-box-shadow: "0 4px 18px rgba(0,0,0,0.28)"
  paper-slider-knob-color: "#ffffff"
  paper-slider-active-color: "#7CFC98"
  switch-checked-color: "#7CFC98"
  input-fill-color: "rgba(0,0,0,0.22)"
  input-ink-color: "#ffffff"
  input-label-ink-color: "rgba(255,255,255,0.7)"

